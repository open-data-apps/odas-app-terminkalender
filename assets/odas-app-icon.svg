<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund-Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    <!-- Schatten-Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Optional: Glanz-Overlay oben-links -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="white" fill-opacity="0.07"/>

  <!-- Motiv: Terminkalender -->
  <g filter="url(#shadow)">
    <!-- Kalenderblatt -->
    <rect x="126" y="140" width="260" height="260" rx="20" fill="none" stroke="#ffffff" stroke-width="24"/>
    <path d="M 126 210 L 386 210" stroke="#ffffff" stroke-width="24"/>
    <!-- Ringe oben -->
    <rect x="170" y="110" width="20" height="40" rx="10" fill="#ffffff"/>
    <rect x="246" y="110" width="20" height="40" rx="10" fill="#ffffff"/>
    <rect x="322" y="110" width="20" height="40" rx="10" fill="#ffffff"/>
    <!-- Checkmark im Kalender -->
    <path d="M 200 300 L 240 340 L 320 250" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>